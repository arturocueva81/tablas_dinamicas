<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplication System v1.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="multiplicar.css">
</head>
<body>

    <header>
        <button class="btn-probar" onclick="generarTablas()">PROBAR</button>
    </header>

    <main class="container">
        <h1>TABALS DINAMICAS DE MULTIPLICACION</h1>
        
        <div class="input-group">
            <label for="numTabla">INGRESAR VALOR:</label>
            <input type="number" id="numTabla" placeholder="Ej: 5" min="1">
        </div>
        

        <div class="tabla" id="contenedorTabla">
            <div class="fila"><span>3 x 1</span> <span>=</span> <strong>3</strong></div>
            <div class="fila"><span>3 x 2</span> <span>=</span> <strong>6</strong></div>
            <div class="fila"><span>3 x 3</span> <span>=</span> <strong>9</strong></div>
            <div class="fila"><span>3 x 4</span> <span>=</span> <strong>12</strong></div>
            <div class="fila"><span>3 x 5</span> <span>=</span> <strong>15</strong></div>
            <div class="fila"><span>3 x 6</span> <span>=</span> <strong>18</strong></div>
            <div class="fila"><span>3 x 7</span> <span>=</span> <strong>21</strong></div>
            <div class="fila"><span>3 x 8</span> <span>=</span> <strong>24</strong></div>
            <div class="fila"><span>3 x 9</span> <span>=</span> <strong>27</strong></div>
            <div class="fila"><span>3 x 10</span> <span>=</span> <strong>30</strong></div>
        </div>
    </main>

    <footer>
        <div class="footer-box">
            <i class="fab fa-android android-icon"></i>
            <span>Elaborado por <strong>Arturo Cueva</strong></span>
        </div>
    </footer>

    <script src="multiplicar.js"></script>
</body>
</html>
