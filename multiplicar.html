<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla del 3 - Diseño Responsivo</title>
    <link rel="stylesheet" href="multiplicar.css">
</head>
<body>

    <header>
        <button class="btn-probar">PROBAR</button>
    </header>

    <main class="container">
        <h1>Tabla de Multiplicar del 3</h1>
        
        <div class="table-container">
            <div class="row"><span>3 x 1</span> <strong>3</strong></div>
            <div class="row"><span>3 x 2</span> <strong>6</strong></div>
            <div class="row"><span>3 x 3</span> <strong>9</strong></div>
            <div class="row"><span>3 x 4</span> <strong>12</strong></div>
            <div class="row"><span>3 x 5</span> <strong>15</strong></div>
            <div class="row"><span>3 x 6</span> <strong>18</strong></div>
            <div class="row"><span>3 x 7</span> <strong>21</strong></div>
            <div class="row"><span>3 x 8</span> <strong>24</strong></div>
            <div class="row"><span>3 x 9</span> <strong>27</strong></div>
            <div class="row"><span>3 x 10</span> <strong>30</strong></div>
        </div>
    </main>

</body>
</html>
